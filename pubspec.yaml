name: cropguard_flutter
description: CropGuard AI - Crop Disease Detection App (Flutter)
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.1.0
  firebase_remote_config: ^5.0.2
  firebase_app_check: ^0.3.0
  google_sign_in: ^6.2.2

  # Local storage
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  path: ^1.9.0

  # State management / DI
  provider: ^6.1.2
  get_it: ^7.7.0

  # Camera
  camera: ^0.10.5+9

  # ML / TFLite
  tflite_flutter: ^0.10.4
  image: ^4.2.0

  # Image handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Biometric
  local_auth: ^2.3.0

  # Text-to-speech
  flutter_tts: ^4.0.2

  # Speech-to-text
  speech_to_text: ^6.6.2
  record: ^5.1.0

  # Background tasks
  workmanager: ^0.5.2

  # Permissions
  permission_handler: ^11.3.1

  # Internationalization
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # Charts (disease trend)
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.2.1

  # PDF & Sharing
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.1.0

  # Store Features
  in_app_review: ^2.0.9
  in_app_update: ^4.2.5

  # Feedback
  vibration: ^2.0.1
  audioplayers: ^6.0.0

  # Security
  flutter_windowmanager: ^0.2.0
  bcrypt: ^1.1.3
  flutter_jailbreak_detection: ^1.1.0

  # HTTP (weather)
  http: ^1.2.2

  # Maps (outbreak map)
  google_maps_flutter: ^2.6.1

  package_info_plus: ^8.0.2
  firebase_crashlytics: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  mocktail: ^1.0.4


flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/labels.txt
    - assets/model_metadata.json
    - assets/api_specs/
